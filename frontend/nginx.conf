server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all unknown paths fall back to index.html (React Router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets forever (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
