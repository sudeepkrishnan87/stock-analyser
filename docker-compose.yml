version: "3.9"

services:
  # ── FastAPI trading backend ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockbot-api
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - trade-data:/app/data          # persist trades.json across restarts
    networks:
      - internal
    expose:
      - "8000"                        # only accessible inside Docker network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── React frontend (SPA served by nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockbot-frontend
    restart: always
    networks:
      - internal
    expose:
      - "80"

  # ── Nginx reverse proxy + SSL termination ────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: stockbot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot (Let's Encrypt SSL — auto-renews) ────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: stockbot-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renew runs every 12 hours; certbot only actually renews when <30 days left
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  trade-data:
    driver: local
  certbot-certs:
    driver: local
  certbot-www:
    driver: local

networks:
  internal:
    driver: bridge
