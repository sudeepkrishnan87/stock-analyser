services:
  # ── FastAPI trading backend ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockbot-api
    restart: always
    environment:
      - ENVIRONMENT=production
      - AWS_REGION=eu-north-1
    env_file:
      - path: ./backend/.env
        required: false          # optional — local dev only, not needed on EC2
    volumes:
      - trade-data:/app/data
    networks:
      - internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── React frontend (SPA served by nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockbot-frontend
    restart: always
    networks:
      - internal
    expose:
      - "80"

  # ── Nginx reverse proxy + SSL termination ────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: stockbot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # host path where certbot wrote certs
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot (Let's Encrypt SSL — auto-renews every 12h) ──────────
  certbot:
    image: certbot/certbot:latest
    container_name: stockbot-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  trade-data:
    driver: local

networks:
  internal:
    driver: bridge
