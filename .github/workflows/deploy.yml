name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  300s
          script: |
            set -e
            cd /opt/stockbot

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Building images..."
            sudo docker compose build api frontend

            echo "→ Restarting services..."
            sudo docker compose up -d

            echo "→ Waiting for API..."
            # t3.micro is memory-tight (908MB total, often <100MB free at rest —
            # see docs/DEPLOYMENT.md) and a build can push it into swap, making
            # startup slower than the old fixed 15s wait assumed. Poll instead
            # of a one-shot check: exits the moment it's healthy, gives up to
            # 90s before actually failing.
            healthy=false
            for i in $(seq 1 18); do
              sleep 5
              if sudo docker compose exec -T api curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                healthy=true
                break
              fi
              echo "  still waiting... (${i}/18)"
            done
            if [ "$healthy" != "true" ]; then
              echo "❌ API did not become healthy within 90s"
              sudo docker compose logs --tail=50 api
              exit 1
            fi
            echo "✅ Deploy complete at $(date)"
